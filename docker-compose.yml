services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: taxonomy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taxonomy}
      POSTGRES_USER: ${POSTGRES_USER:-taxonomy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxonomy}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxonomy} -d ${POSTGRES_DB:-taxonomy}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
